name: Build base compilers docker images

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    paths:
      - "/docker/Dockerfile.nvidia"
      - "/docker/Dockerfile.cpu"
      - "/docker/Dockerfile.amd"
      - "/docker/Dockerfile.intel"
      - "/docker/Dockerfile.nogil"
  workflow_dispatch:
    inputs:
      cpu:
        type: boolean
        default: false
      nvidia:
        type: boolean
        default: false
      amd:
        type: boolean
        default: false
      intel:
        type: boolean
        default: false

      tags:
        description: "Build compiler bases"
  schedule:
    # Run once a month
    - cron: "0 0 1 * *"

jobs:
  #######################################################
  ############## Basic gcc CPU ##########################
  #######################################################
  deploy-cpu-bases:
    if: inputs.cpu
    name: "cpu-base"
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: "1"

    strategy:
      matrix:
        gcc: ["", "14"]
        disable-gil: [false, true]

    steps:
      - name: Checkout devito
        uses: actions/checkout@v4

      - name: Check event name
        run: echo ${{ github.event_name }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: cleanup
        run: docker system prune -a -f

      - name: Build free-threaded base image
        uses: docker/build-push-action@v6
        if: ${{ matrix.disable-gil }}
        with:
          context: .
          file: "./docker/Dockerfile.nogil"
          tags: "ubuntu-nogil"

      - name: GCC image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: "./docker/Dockerfile.cpu"
          push: true
          build-args: |
            gcc=${{ matrix.gcc }}
            ${{ matrix.disable-gil && 'FROM_IMAGE=ubuntu-nogil' || '' }}
          tags: "devitocodes/bases:cpu-gcc${{ matrix.gcc }}${{ matrix.disable-gil && '-nogil' || '' }}"


  #######################################################
  ############## Intel OneApi CPU #######################
  #######################################################
  deploy-oneapi-bases:
    if: inputs.intel
    name: "oneapi-base"
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: "1"

    strategy:
      matrix:
        disable-gil: [false, true]

    steps:
      - name: Checkout devito
        uses: actions/checkout@v4

      - name: Check event name
        run: echo ${{ github.event_name }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: cleanup
        run: docker system prune -a -f

      - name: Build free-threaded base image
        uses: docker/build-push-action@v6
        if: ${{ matrix.disable-gil }}
        with:
          context: .
          file: "./docker/Dockerfile.nogil"
          tags: "ubuntu-nogil"

      - name: ICX image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: "./docker/Dockerfile.intel"
          push: true
          target: "icx"
          build-args: |
            arch=icx
            ${{ matrix.disable-gil && 'FROM_IMAGE=ubuntu-nogil' || '' }}
          tags: "devitocodes/bases:cpu-icx${{ matrix.disable-gil && '-nogil' || '' }}"

      - name: SYCL CPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: "./docker/Dockerfile.intel"
          push: true
          target: "cpu-sycl"
          build-args: |
            arch=cpu-sycl
            ${{ matrix.disable-gil && 'FROM_IMAGE=ubuntu-nogil' || '' }}
          tags: "devitocodes/bases:cpu-sycl${{ matrix.disable-gil && '-nogil' || '' }}"

      - name: SYCL GPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: "./docker/Dockerfile.intel"
          push: true
          target: "gpu-sycl"
          build-args: |
            arch=gpu-sycl
            ${{ matrix.disable-gil && 'FROM_IMAGE=ubuntu-nogil' || '' }}
          tags: "devitocodes/bases:gpu-sycl${{ matrix.disable-gil && '-nogil' || '' }}"

  #######################################################
  ################### Nvidia nvhpc ######################
  #######################################################
  deploy-nvidia-bases:
    if: inputs.nvidia
    name: "nvidia-bases"
    runs-on: ["self-hosted", "nvidiagpu"]
    env:
      DOCKER_BUILDKIT: "1"

    strategy:
      matrix:
        disable-gil: [false, true]

    steps:
      - name: Checkout devito
        uses: actions/checkout@v4

      - name: Check event name
        run: echo ${{ github.event_name }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: cleanup
        run: docker system prune -a -f

      - name: Build free-threaded base image
        uses: docker/build-push-action@v6
        if: ${{ matrix.disable-gil }}
        with:
          context: .
          file: "./docker/Dockerfile.nogil"
          tags: "ubuntu-nogil"

      - name: NVC image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: "./docker/Dockerfile.nvidia"
          push: true
          target: "nvc"
          build-args: |
            arch=nvc
            ${{ matrix.disable-gil && 'FROM_IMAGE=ubuntu-nogil' || '' }}
          # Label (not tag) with runner name for traceability without changing image tags
          labels: builder-runner=${{ runner.name }}
          tags: "devitocodes/bases:nvidia-nvc${{ matrix.disable-gil && '-nogil' || '' }}"

      - name: NVCC image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: "./docker/Dockerfile.nvidia"
          push: true
          target: "nvcc"
          build-args: |
            arch=nvcc
            ${{ matrix.disable-gil && 'FROM_IMAGE=ubuntu-nogil' || '' }}
          labels: builder-runner=${{ runner.name }}
          tags: "devitocodes/bases:nvidia-nvcc${{ matrix.disable-gil && '-nogil' || '' }}"

      - name: NVC host image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: "./docker/Dockerfile.nvidia"
          push: true
          target: "nvc-host"
          build-args: |
            arch=nvc-host
            ${{ matrix.disable-gil && 'FROM_IMAGE=ubuntu-nogil' || '' }}
          labels: builder-runner=${{ runner.name }}
          tags: "devitocodes/bases:cpu-nvc${{ matrix.disable-gil && '-nogil' || '' }}"

  #######################################################
  ##################### AMD #############################
  #######################################################
  deploy-amd-bases:
    if: inputs.amd
    name: "amd-base"
    runs-on: ["self-hosted", "amdgpu"]
    env:
      DOCKER_BUILDKIT: "1"

    strategy:
      matrix:
        disable-gil: [false, true]

    steps:
      - name: Checkout devito
        uses: actions/checkout@v4

      - name: Check event name
        run: echo ${{ github.event_name }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: cleanup
        run: docker system prune -a -f

      - name: Build free-threaded base image
        uses: docker/build-push-action@v6
        if: ${{ matrix.disable-gil }}
        with:
          context: .
          file: "./docker/Dockerfile.nogil"
          tags: "ubuntu-nogil"

      - name: AMD image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: "./docker/Dockerfile.amd"
          push: true
          target: "amdclang"
          build-args: |
            ROCM_VERSION=5.5.1
            UCX_BRANCH=v1.13.1
            OMPI_BRANCH=v4.1.4
            ${{ matrix.disable-gil && 'FROM_IMAGE=ubuntu-nogil' || '' }}
          tags: devitocodes/bases:amd${{ matrix.disable-gil && '-nogil' || '' }}

      - name: AMD HIP image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: "./docker/Dockerfile.amd"
          push: true
          target: "hip"
          build-args: |
            ROCM_VERSION=6.3.4
            ${{ matrix.disable-gil && 'FROM_IMAGE=ubuntu-nogil' || '' }}
          tags: devitocodes/bases:amd-hip${{ matrix.disable-gil && '-nogil' || '' }}
