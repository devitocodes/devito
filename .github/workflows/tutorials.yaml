name: Jupyter Notebooks

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  # Trigger the workflow on push or pull request, but only for the main branch
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  tutorials-basic:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    env:
      DEVITO_ARCH: "${{ matrix.compiler }}"
      DEVITO_LANGUAGE: ${{ matrix.language }}

    strategy:
      # Prevent cancellation if a single workflow fails
      fail-fast: false
      matrix:
        name: [
          tutos-ubuntu-gcc-py310,
          tutos-osx-clang-py311
          ]

        include:
          - name: tutos-ubuntu-gcc-py310
            os: ubuntu-latest
            compiler: gcc
            language: "openmp"
            python-version: "3.10"

          - name: tutos-osx-clang-py311
            os: macos-latest
            compiler: clang
            language: "C"
            python-version: "3.11"

    steps:
    - name: Checkout devito
      uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - uses: maxim-lobanov/setup-xcode@v1
      if: runner.os == 'macOS'
      with:
        xcode-version: latest-stable

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[tests,extras]"
        pip install blosc

    - name: Test all notebooks
      run: |
        pytest \
          -v \
          --nbval \
          -k 'not dask and not synthetics and not mpi' \
          examples

    - name: Failing notebooks
      # TODO: Fix or skip this
      continue-on-error: true
      run: |
        pytest -v --nbval examples/seismic/tutorials/14_creating_synthetics.ipynb

    - name: Dask notebooks
      if: runner.os != 'macOS'
      run: |
        pytest -v --nbval examples/seismic/tutorials/*dask*.ipynb

  tutorials-docker:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    env:
      DEVITO_ARCH: "${{ matrix.compiler }}"
      DEVITO_LANGUAGE: ${{ matrix.language }}

    strategy:
      # Prevent cancellation if a single workflow fails
      fail-fast: false
      matrix:
        name: [
          tutos-docker-gcc-py310
          ]

        include:
          - name: tutos-docker-gcc-py310
            os: ubuntu-latest
            compiler: gcc
            language: "openmp"
            python-version: "3.10"

    steps:
    - name: Checkout devito
      uses: actions/checkout@v6

    - id: build
      name: Build docker image
      uses: ./.github/actions/docker-build
      with:
        file: docker/Dockerfile.devito
        tag: ${{ matrix.name }}

    - name: Test seismic notebooks
      uses: ./.github/actions/docker-run
      with:
        uid: ${{ steps.build.outputs.unique }}
        tag: ${{ matrix.name }}
        env: |
          CI=true
          CODECOV_TOKEN=${{ secrets.CODECOV_TOKEN }}
          PYTHONFAULTHANDLER=1
        command: |
          pytest \
            -v \
            --nbval \
            -k 'not dask and not synthetics and not mpi' \
            examples

    - name: Failing notebooks
      continue-on-error: true
      uses: ./.github/actions/docker-run
      with:
        uid: ${{ steps.build.outputs.unique }}
        tag: ${{ matrix.name }}
        env: |
          CI=true
          CODECOV_TOKEN=${{ secrets.CODECOV_TOKEN }}
          PYTHONFAULTHANDLER=1
        command: |
          pytest -v --nbval examples/seismic/tutorials/14_creating_synthetics.ipynb

    - name: Dask notebooks
      uses: ./.github/actions/docker-run
      with:
        uid: ${{ steps.build.outputs.unique }}
        tag: ${{ matrix.name }}
        env: |
          CI=true
          CODECOV_TOKEN=${{ secrets.CODECOV_TOKEN }}
          DEVITO_LOGGING=DEBUG
          PYTHONFAULTHANDLER=1
        command: |
          pytest -v --nbval examples/seismic/tutorials/*dask*.ipynb

    - name: Cleanup docker image
      if: always()
      uses: ./.github/actions/docker-clean
      with:
        uid: ${{ steps.build.outputs.unique }}
        tag: ${{ matrix.name }}
